<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kafka-mini Admin</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">
    <div class="container">
        <header>
            <h1>Kafka-mini <span>Admin</span></h1>
            <div id="status-badge" class="badge">Checking...</div>
        </header>

        <main>
            <section class="card stats-grid">
                <div class="stat-item">
                    <label>Total Topics</label>
                    <span id="topic-count">0</span>
                </div>
                <div class="stat-item">
                    <label>Active Groups</label>
                    <span id="group-count">0</span>
                </div>
                <div class="stat-item">
                    <label>Broker Address</label>
                    <span id="broker-addr">localhost:9092</span>
                </div>
            </section>

            <div class="dashboard-grid">
                <section class="card node-section">
                    <div class="card-header">
                        <h2>Node Info</h2>
                        <div id="node-badge" class="badge">N/A</div>
                    </div>
                    <div class="node-details">
                        <div class="detail-item"><strong>Node ID:</strong> <span id="node-id">-</span></div>
                        <div class="detail-item"><strong>State:</strong> <span id="node-state">-</span></div>
                        <div class="detail-item"><strong>Term:</strong> <span id="node-term">-</span></div>
                        <div class="detail-item"><strong>Leader ID:</strong> <span id="node-leader">-</span></div>
                    </div>
                </section>

                <section class="card topic-section">
                    <div class="card-header">
                        <h2>Topic Management</h2>
                        <button id="btn-add-topic" class="btn primary">Create Topic</button>
                    </div>
                    <div class="table-container">
                        <table id="topic-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Partitions</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Loaded via JS -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>

            <section class="card group-section">
                <div class="card-header">
                    <h2>Consumer Groups</h2>
                </div>
                <div class="table-container">
                    <table id="group-table">
                        <thead>
                            <tr>
                                <th>Group ID</th>
                                <th>Subscribed Topics</th>
                                <th>Members</th>
                                <th>State</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Loaded via JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal for Topic Creation -->
    <div id="topic-modal" class="modal">
        <div class="modal-content">
            <h3>Create New Topic</h3>
            <div class="form-group">
                <label>Topic Name</label>
                <input type="text" id="new-topic-name" placeholder="e.g. orders-topic">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Partitions</label>
                    <input type="number" id="new-topic-partitions" value="1" min="1">
                </div>
            </div>
            <div class="modal-actions">
                <button id="btn-cancel" class="btn secondary">Cancel</button>
                <button id="btn-confirm-create" class="btn primary">Create</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
